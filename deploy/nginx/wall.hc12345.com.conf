server {
    listen 80;
    server_name wall.hc12345.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://wall.hc12345.com$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name wall.hc12345.com;

    root /www/wall-ad-system/current/dist;
    index index.html;

    ssl_certificate /etc/letsencrypt/live/wall.hc12345.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wall.hc12345.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 200M;

    location /api/ {
        proxy_pass http://127.0.0.1:8787/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location /uploads/ {
        alias /www/wall-ad-system/shared/server/uploads/;
        access_log off;
        expires 30d;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
